// ── Helpers ──────────────────────────────────────────────────────────────────
const out = document.getElementById('out');

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function append(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  out.appendChild(d);
}

function br() { out.appendChild(document.createElement('br')); }

// Typewriter: types text into a <span> inside a pre-existing div, returns Promise
function type(div, html, speed = 28) {
  return new Promise(resolve => {
    // We'll strip HTML tags to get raw text, then re-inject styled spans after
    // For simplicity: inject colored spans instantly, but reveal char-by-char via clip
    div.innerHTML = html;
    div.style.overflow = 'hidden';
    div.style.maxWidth = '0px';
    div.style.whiteSpace = 'nowrap';
    div.style.transition = `max-width ${(html.replace(/<[^>]*>/g,'').length * speed)}ms steps(${html.replace(/<[^>]*>/g,'').length}, end)`;
    requestAnimationFrame(() => {
      div.style.maxWidth = '900px';
      setTimeout(resolve, html.replace(/<[^>]*>/g,'').length * speed + 40);
    });
  });
}

// Simpler: just fade-in line by line with delay
function addLine(html, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const d = document.createElement('div');
      d.innerHTML = html;
      d.style.opacity = '0';
      out.appendChild(d);
      requestAnimationFrame(() => {
        d.style.transition = 'opacity 0.18s';
        d.style.opacity = '1';
      });
      resolve(d);
    }, delay);
  });
}

// Type a prompt line char by char
function typeLine(html, baseDelay, speed = 22) {
  const raw = html.replace(/<[^>]*>/g, '');
  return new Promise(resolve => {
    setTimeout(() => {
      const d = document.createElement('div');
      out.appendChild(d);

      // show styled content instantly but mask with char-by-char reveal using a wrapper
      const wrapper = document.createElement('span');
      wrapper.innerHTML = html;
      wrapper.style.display = 'inline';
      d.appendChild(wrapper);

      // overlay: blank characters typed over it
      // Actually: build text char by char in a plain span first
      d.innerHTML = '';
      let i = 0;
      const chars = raw.split('');
      const interval = setInterval(() => {
        if (i >= chars.length) {
          clearInterval(interval);
          // Replace plain text with styled HTML version
          d.innerHTML = html;
          resolve(d);
          return;
        }
        d.textContent = raw.slice(0, i + 1);
        i++;
      }, speed);
    }, baseDelay);
  });
}
